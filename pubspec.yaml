name: ashinagame
description: "Ashina: Bozkırda Bir Ömür playable Flutter foundation."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Cinzel
      fonts:
        - asset: assets/fonts/Cinzel.ttf
    - family: Alegreya
      fonts:
        - asset: assets/fonts/Alegreya.ttf
  assets:
    - assets/images/characters/
    - assets/images/backgrounds/
    - assets/images/icons/
    - assets/images/icons/deco/
    - assets/images/ui/
    - assets/audio/music/
    - assets/audio/sfx/
