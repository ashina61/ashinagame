name: ashinagame
description: "Ashina: Bozkırda Bir Ömür playable Flutter foundation."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.3
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

# Launcher icon generated from the supplied Bozkurt emblem.
# Regenerate with: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0B0B0B"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  fonts:
    - family: Cinzel
      fonts:
        - asset: assets/fonts/Cinzel.ttf
    - family: Alegreya
      fonts:
        - asset: assets/fonts/Alegreya.ttf
  assets:
    - assets/images/characters/
    - assets/images/backgrounds/
    - assets/images/icons/
    - assets/images/icons/deco/
    - assets/images/ui/
    - assets/audio/music/
    - assets/audio/sfx/
    # Game-feel art pipeline. Drop produced art into these folders (see
    # assets/images/game/README.md) and it is picked up with no code change.
    - assets/images/game/scenes/camp/
    - assets/images/game/scenes/tent/
    - assets/images/game/scenes/market/
    - assets/images/game/scenes/map/
    - assets/images/game/scenes/oba/
    - assets/images/game/scenes/conquest/
    - assets/images/game/scenes/household/
    - assets/images/game/scenes/workshop/
    - assets/images/game/buildings/tent/
    - assets/images/game/buildings/oba/
    - assets/images/game/buildings/market/
    - assets/images/game/buildings/workshop/
    - assets/images/game/buildings/ritual/
    - assets/images/game/objects/camp/
    - assets/images/game/objects/tent/
    - assets/images/game/objects/market/
    - assets/images/game/objects/map/
    - assets/images/game/portraits/player/
    - assets/images/game/portraits/npc/
    - assets/images/game/portraits/companions/
    - assets/images/game/portraits/marriage/
    - assets/images/game/items/weapons/
    - assets/images/game/items/armor/
    - assets/images/game/items/horse/
    - assets/images/game/items/gifts/
    - assets/images/game/symbols/tribes/
    - assets/images/game/symbols/gokturk/
    - assets/images/game/symbols/tamga/
    - assets/images/game/ui/hud/
    - assets/images/game/ui/panels/
    - assets/images/game/ui/frames/
    - assets/images/game/ui/buttons/
    - assets/images/game/ui/bars/
    - assets/images/game/ui/cards/
    - assets/images/game/ui/icons/
    - assets/images/game/ui/icons/skills/
    - assets/images/game/ui/icons/resources/
    - assets/images/game/ui/map/
    - assets/images/game/ui/map/pins/
    - assets/images/game/ui/milestones/
