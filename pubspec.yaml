name: ashinagame
description: "Ashina — Bozkırda kağanlık: kaydır-karar ver hayatta kalma oyunu."
publish_to: 'none'
version: 0.2.0+2

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.3
  audioplayers: ^6.1.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

# Launcher icon generated from the Bozkurt emblem.
# Regenerate with: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0B0B0B"
  # Transparent, padded wolf so adaptive launchers show it inside the safe zone
  # instead of a dark full-bleed square.
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  fonts:
    - family: Cinzel
      fonts:
        - asset: assets/fonts/Cinzel.ttf
    - family: Alegreya
      fonts:
        - asset: assets/fonts/Alegreya.ttf
  # Drop-in art & audio. Files are optional — the app falls back to painted
  # visuals / silence when a file is missing. See docs/ART_PROMPTS.md.
  assets:
    - assets/images/portraits/
    - assets/images/bg/
    - assets/images/ui/
    - assets/audio/sfx/
    - assets/audio/music/
