name: Deploy Web

# Publishes the Flutter web build to GitHub Pages so the game can be opened on
# any phone with a single link, no install. One-time setup: in the repo go to
# Settings → Pages → Build and deployment → Source: "GitHub Actions".
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.2
          cache: true
      # Turns Pages on automatically (build type = GitHub Actions) so no manual
      # repo setting is needed before the first deploy.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - run: flutter pub get
      # base-href must match the project-pages path: https://<user>.github.io/ashinagame/
      - run: flutter build web --release --base-href /ashinagame/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
