name: Auto Dart Format

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'test/**'
      - '.github/workflows/auto-dart-format.yml'

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          # Pin to the same version as build-apk.yml so the formatter style
          # matches; unpinned "stable" drifts to newer dart_style releases and
          # produces output the pinned build job's format check then rejects.
          flutter-version: 3.44.2

      - name: Show versions
        run: |
          flutter --version
          dart --version

      # `dart format` picks its style from the package's resolved language
      # version, so it must run against the same package config as build-apk.yml
      # (which runs `flutter pub get` first). Without this the formatter falls
      # back to a different style and the two jobs fight over the same files.
      - name: Resolve packages
        run: flutter pub get

      - name: Apply Dart format
        run: dart format lib test

      - name: Show formatting diff
        run: |
          git status --short
          git diff -- lib/features/tent/tent_scene.dart lib/game/state/game_controller.dart lib/game/state/game_serializer.dart || true

      - name: Commit and push formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add lib test
            git commit -m "Apply Dart format"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No formatting changes."
          fi

      - name: Verify format
        run: dart format --set-exit-if-changed lib test
