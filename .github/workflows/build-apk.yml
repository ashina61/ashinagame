name: Build Android APK

on:
  push:
    branches: [ main, master, work ]
  pull_request:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: flutter create --platforms=android --project-name ashinagame --org com.ashina .
      - run: flutter pub get
      - run: dart format --set-exit-if-changed lib test
      - run: flutter analyze
      - run: flutter test
      # `flutter create` above resets the launcher icon to the default Flutter
      # logo; regenerate the Ashina icon from assets/icon before packaging.
      - run: dart run flutter_launcher_icons
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: ashina-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
